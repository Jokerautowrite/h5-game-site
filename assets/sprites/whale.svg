    <!-- tail -->
    <path d="M96 70c10-10 18-10 20-2 2 8-6 16-18 14"
          fill="none" stroke="#2b1630" stroke-width="8" stroke-linecap="round"/>
    <!-- belly -->
    <path d="M34 78c10 12 32 16 52 6" fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="10" stroke-linecap="round"/>
    <!-- eye -->
    <circle cx="54" cy="62" r="7.5" fill="#fff" stroke="#2b1630" stroke-width="5"/>
    <circle cx="54" cy="62" r="3.2" fill="#151224"/>
    <circle cx="56" cy="60" r="1.2" fill="#fff" opacity="0.9"/>
    <!-- mouth -->
    <path d="M44 74c8 6 18 6 26 0" fill="none" stroke="#2b1630" stroke-width="6" stroke-linecap="round"/>
    <!-- water spout -->
    <path d="M70 38c2-10 12-16 20-10" fill="none" stroke="#2b1630" stroke-width="6" stroke-linecap="round"/>
    <path d="M72 36c2-8 10-12 16-7" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="5" stroke-linecap="round"/>
  </g>
