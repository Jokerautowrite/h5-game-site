<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 128 128">
  <defs>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="w" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c7f7ff"/>
      <stop offset="1" stop-color="#3aa7ff"/>
    </linearGradient>
  </defs>
  <g filter="url(#s)">
    <path d="M18 70c0-22 22-40 50-40 26 0 42 13 42 30 0 22-22 40-50 40-26 0-42-13-42-30z"
