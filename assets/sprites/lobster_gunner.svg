<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <linearGradient id="shell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a8d8ff"/>
      <stop offset="1" stop-color="#3a86ff"/>
    </linearGradient>
    <linearGradient id="shell2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d7f0ff"/>
      <stop offset="1" stop-color="#66b3ff"/>
    </linearGradient>
  </defs>
  <g filter="url(#s)">
    <path d="M34 67c-8-12 3-28 18-30 10-2 17 4 18 12 1 10-6 19-15 23-8 4-16 2-21-5z"
          fill="url(#shell2)" stroke="#1b1b2a" stroke-width="6" stroke-linejoin="round"/>
    <ellipse cx="70" cy="64" rx="28" ry="24" fill="url(#shell)" stroke="#1b1b2a" stroke-width="6"/>
    <ellipse cx="62" cy="56" rx="12" ry="9" fill="#ffffff" opacity="0.35"/>

    <!-- bubble cannon (one big claw/cannon) -->
    <g transform="translate(-2,-6) scale(1.28)">
      <path d="M96 43c13 3 22 15 18 27-3 9-12 14-21 12-7-2-11-7-11-13 0-5 3-8 7-9-2-6 1-13 7-17z"
            fill="url(#shell2)" stroke="#1b1b2a" stroke-width="6" stroke-linejoin="round"/>
      <path d="M110 56c6 0 11 5 11 11s-5 11-11 11-11-5-11-11 5-11 11-11z"
            fill="#c7f7ff" stroke="#1b1b2a" stroke-width="6"/>
      <circle cx="112" cy="62" r="3" fill="#ffffff" opacity="0.85"/>
    </g>

    <!-- small claw -->
    <path d="M96 85c13-3 22-15 18-27-3-9-12-14-21-12-7 2-11 7-11 13 0 5 3 8 7 9-2 6 1 13 7 17z"
          fill="url(#shell2)" stroke="#1b1b2a" stroke-width="6" stroke-linejoin="round"/>

    <!-- eyes -->
    <g>
      <circle cx="78" cy="56" r="6.5" fill="#ffffff" stroke="#1b1b2a" stroke-width="4"/>
      <circle cx="78" cy="56" r="2.8" fill="#151224"/>
      <circle cx="78" cy="72" r="6.5" fill="#ffffff" stroke="#1b1b2a" stroke-width="4"/>
      <circle cx="78" cy="72" r="2.8" fill="#151224"/>
    </g>
  </g>
</svg>
