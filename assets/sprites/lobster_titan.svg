<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="shell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd58a"/>
      <stop offset="1" stop-color="#ff6b2e"/>
    </linearGradient>
    <linearGradient id="shell2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe7b8"/>
      <stop offset="1" stop-color="#ff9a3a"/>
    </linearGradient>
  </defs>
  <g filter="url(#s)">
    <path d="M34 67c-8-12 3-28 18-30 10-2 17 4 18 12 1 10-6 19-15 23-8 4-16 2-21-5z"
          fill="url(#shell2)" stroke="#2b1630" stroke-width="6" stroke-linejoin="round"/>
    <ellipse cx="70" cy="64" rx="30" ry="26" fill="url(#shell)" stroke="#2b1630" stroke-width="6"/>
    <ellipse cx="62" cy="56" rx="13" ry="10" fill="#ffffff" opacity="0.28"/>

    <!-- giant crusher claw -->
    <g transform="translate(-10,-10) scale(1.45)">
      <path d="M96 43c13 3 22 15 18 27-3 9-12 14-21 12-7-2-11-7-11-13 0-5 3-8 7-9-2-6 1-13 7-17z"
            fill="url(#shell2)" stroke="#2b1630" stroke-width="6" stroke-linejoin="round"/>
      <path d="M104 59c4-2 9-2 12 1 4 4 1 10-5 12-7 3-13-1-13-6 0-3 2-6 6-7z"
            fill="#ffe6c6" stroke="#2b1630" stroke-width="6" stroke-linejoin="round"/>
    </g>

    <!-- tiny other claw -->
    <path d="M92 88c9-2 15-10 13-18-2-6-8-9-14-8-5 1-8 5-8 9 0 3 2 6 5 7-1 4 1 8 4 10z"
          fill="url(#shell2)" stroke="#2b1630" stroke-width="6" stroke-linejoin="round"/>

    <!-- eyes -->
    <g>
      <circle cx="78" cy="56" r="6.5" fill="#ffffff" stroke="#2b1630" stroke-width="4"/>
      <circle cx="78" cy="56" r="2.8" fill="#151224"/>
      <circle cx="78" cy="72" r="6.5" fill="#ffffff" stroke="#2b1630" stroke-width="4"/>
      <circle cx="78" cy="72" r="2.8" fill="#151224"/>
    </g>
  </g>
</svg>
